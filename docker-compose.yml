services:
  postgres:
    image: postgres:17-alpine
    container_name: proyecto-gym-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: proyecto_gym
      POSTGRES_USER: proyecto_gym
      POSTGRES_PASSWORD: proyecto_gym_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proyecto_gym -d proyecto_gym"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: proyecto-gym-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_dev
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
